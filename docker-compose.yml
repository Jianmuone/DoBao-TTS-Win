services:
  dob ao-tts:
    image: ghcr.io/YOUR_USERNAME/dobao-tts:latest
    container_name: dob ao-tts
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    restart: unless-stopped
