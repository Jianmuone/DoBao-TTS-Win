<!doctype html><html lang=zh-CN><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><title>语音合成 - DoBao TTS</title><script>(()=>{var e=localStorage.getItem("theme")||"light";("dark"===e||"system"===e&&window.matchMedia("(prefers-color-scheme: dark)").matches)&&document.documentElement.setAttribute("data-theme","dark")})()</script><link rel=stylesheet href=/css/console.css><link rel=stylesheet href=/css/tts.css><link rel=stylesheet href=/css/mobile-fix.css><link rel=stylesheet href=/css/onboarding.css><link rel=stylesheet href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css><div class=app-container><header class=app-header><div class=header-content><div class=header-left><button class=mobile-menu-btn id=mobileMenuBtn><i class="fas fa-bars"></i></button><div class=app-title><i class="fas fa-volume-up app-icon"></i> <span>语音合成</span></div></div><div class=header-right><a href=/ class=header-btn title=返回总览><i class="fas fa-home"></i> </a><button class=header-btn id=clearHistory title=清空历史><i class="fas fa-trash-alt"></i></button></div></div></header><div class=sidebar-overlay id=sidebarOverlay></div><div class=tts-body><main class=tts-main role=main aria-label=语音生成><aside class=tts-sidebar id=ttsSidebar role=complementary aria-label=发音人和历史记录><section class=sidebar-section aria-label=发音人选择><div class="sidebar-section-header collapsible" data-section=voice><i class="fas fa-user-circle"></i><h3>发音人选择</h3><i class="fas fa-chevron-down toggle-icon"></i></div><div class=sidebar-section-body data-section-body=voice><div class=voice-search><input id=voiceSearch placeholder=搜索发音人... aria-label=搜索发音人> <i class="fas fa-search"></i></div><div class=voice-filters><select id=languageFilter aria-label=语言筛选><option value="">全部语言</select> <select id=genderFilter aria-label=性别筛选><option value="">全部性别<option value=男>男<option value=女>女</select></div><div class=voice-list id=voiceList role=listbox aria-label=发音人列表><div class=voice-loading><i class="fas fa-spinner fa-spin"></i> <span>加载中...</span></div></div></div></section><section class=sidebar-section aria-label=历史记录><div class="sidebar-section-header collapsible" data-section=history><i class="fas fa-history"></i><h3>历史记录</h3><span class=history-count id=historyCount>0</span> <i class="fas fa-chevron-down toggle-icon"></i></div><div class=sidebar-section-body data-section-body=history><div class=history-list id=historyList role=list aria-label=历史记录列表><div class=history-empty><i class="fas fa-inbox"></i><p>暂无历史记录</div></div></div></section></aside><div class=tts-content><section class=tts-card aria-label=文本输入><div class=card-header><i class="fas fa-keyboard"></i><h3>文本输入</h3><span class=text-count id=textCount>0 / 5000</span></div><div class=card-body><textarea id=textInput placeholder=请输入要转换的文本内容... maxlength=5000 aria-label=输入要转换的文本></textarea></div></section><section class=tts-card aria-label=参数调节><div class=card-header><i class="fas fa-sliders-h"></i><h3>参数调节</h3></div><div class=card-body><div class=params-grid><div class=param-group><label><span>语速</span> <span class=param-value id=rateValue>0</span></label> <input type=range id=rateSlider min=-50 max=100 value=0 step=1 aria-label=语速 aria-valuemin=-50 aria-valuemax=100 aria-valuenow=0><div class=param-marks><span>慢</span> <span>正常</span> <span>快</span></div></div><div class=param-group><label><span>音调</span> <span class=param-value id=pitchValue>0</span></label> <input type=range id=pitchSlider min=-12 max=12 value=0 step=1 aria-label=音调 aria-valuemin=-12 aria-valuemax=12 aria-valuenow=0><div class=param-marks><span>低</span> <span>正常</span> <span>高</span></div></div></div></div></section><button class=btn-generate id=generateBtn aria-label=生成语音 aria-busy=false><i class="fas fa-play"></i> <span>生成语音</span></button><section class=tts-card aria-label=音频播放器><div class=card-header><i class="fas fa-music"></i><h3>当前音频播放器</h3></div><div class=card-body><div class=audio-player id=audioPlayer><div class=audio-placeholder><i class="fas fa-headphones"></i><p>暂无音频</div></div></div></section></div></main></div></div><div class=toast-container id=toastContainer></div><script src=/js/theme.js></script><script src=/js/tts.js></script><script src=/js/onboarding.js></script>
